
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procura-se uma Namorada</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:900px;
    margin:0 auto;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.topo{
    background:#ff4d6d;
    color:white;
    text-align:center;
    padding:40px 20px;
}

.topo h1{
    font-size:3rem;
    margin-bottom:10px;
}

.topo p{
    font-size:1.2rem;
}

.foto{
    text-align:center;
    padding:40px 20px;
}

.foto img{
    width:280px;
    height:280px;
    object-fit:cover;
    border-radius:50%;
    border:8px solid #ff4d6d;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.requisitos{
    background:#fff0f3;
    padding:35px;
}

.requisitos h2{
    text-align:center;
    color:#ff4d6d;
    margin-bottom:25px;
}

.requisitos ul{
    list-style:none;
    max-width:600px;
    margin:auto;
}

.requisitos li{
    background:white;
    margin-bottom:15px;
    padding:15px;
    border-left:6px solid #ff4d6d;
    border-radius:10px;
    font-size:18px;
}

.formulario{
    padding:35px;
}

.formulario h2{
    text-align:center;
    color:#ff4d6d;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#ff4d6d;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e63956;
}

.contato{
    background:#fff0f3;
    text-align:center;
    padding:25px;
    font-size:20px;
    font-weight:bold;
    color:#ff4d6d;
}

@media(max-width:600px){

    .topo h1{
        font-size:2rem;
    }

    .foto img{
        width:220px;
        height:220px;
    }

}

</style>
</head>
<body>

    </div>
